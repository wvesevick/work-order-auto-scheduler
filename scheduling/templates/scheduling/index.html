    <script>
        let map, directionsService, directionsRenderer, showDistance = true;
        let scheduleData = [];
        let technicianActivityMap = {};
        let currentWeekStart = null;
        let currentDisplayDate = null;
        let selectedTechnician = null;
        let selectedActivityType = 'All';
        const now = new Date();
        const initialStartDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        function toISODateUTC(dateObj) {
            return dateObj.toISOString().split('T')[0];
        }

        function hasScheduleEntriesForDate(dateStr) {
            return scheduleData.some(tech =>
                tech.schedule.some(entry =>
                    entry.start_time.split('T')[0] === dateStr &&
                    ['pending', 'scheduled', 'complete'].includes(entry.work_order.status)
                )
            );
        }

        function getFirstDateWithEntriesInWeek(weekStartDate) {
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStartDate);
                date.setUTCDate(weekStartDate.getUTCDate() + i);
                const dateStr = toISODateUTC(date);
                if (hasScheduleEntriesForDate(dateStr)) {
                    return dateStr;
                }
            }
            return null;
        }

        async function geocodeAddressOpenStreetMap(address) {
            const key = `osm_geocode_${address}`;
            const cached = localStorage.getItem(key);
            if (cached) {
                try {
                    return JSON.parse(cached);
                } catch (error) {
                    localStorage.removeItem(key);
                }
            }

            const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(address)}`;
            const response = await fetch(url, {
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) {
                throw new Error(`Geocode failed (${response.status})`);
            }
            const results = await response.json();
            if (!results.length) {
                throw new Error('Address not found');
            }
            const coords = {
                lat: parseFloat(results[0].lat),
                lon: parseFloat(results[0].lon)
            };
            localStorage.setItem(key, JSON.stringify(coords));
            return coords;
        }

        function formatDurationSeconds(seconds) {
            if (!Number.isFinite(seconds) || seconds <= 0) {
                return '0 min';
            }
            const totalMinutes = Math.round(seconds / 60);
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            if (!hours) {
                return `${totalMinutes} min`;
            }
            if (!minutes) {
                return `${hours} hr`;
            }
            return `${hours} hr ${minutes} min`;
        }

        function formatDistanceMeters(meters) {
            if (!Number.isFinite(meters) || meters <= 0) {
                return '0 mi';
            }
            const miles = meters / 1609.344;
            return `${miles >= 10 ? miles.toFixed(0) : miles.toFixed(1)} mi`;
        }

        async function fetchRoadRoute(routeCoords) {
            if (routeCoords.length < 2) {
                return null;
            }
            const points = routeCoords.map(p => `${p.lon},${p.lat}`).join(';');
            const url = `https://router.project-osrm.org/route/v1/driving/${points}?overview=full&geometries=geojson&steps=false`;
            const response = await fetch(url, {
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) {
                throw new Error(`Routing failed (${response.status})`);
            }
            const result = await response.json();
            if (result.code !== 'Ok' || !result.routes || !result.routes.length) {
                throw new Error(result.message || 'No drivable route found');
            }
            return result.routes[0];
        }

        async function fetchServerRoute(stops) {
            const response = await fetch('/api/route-preview/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stops })
            });
            if (!response.ok) {
                throw new Error(`Server route failed (${response.status})`);
            }
            return response.json();
        }

        async function renderOpenStreetMapForTechnician(techName) {
            const scheduleDiv = document.getElementById('schedule');
            scheduleDiv.innerHTML = '';

            const daySection = document.createElement('div');
            daySection.className = 'day-section';
            const dateObj = new Date(Date.UTC(
                parseInt(currentDisplayDate.split('-')[0]),
                parseInt(currentDisplayDate.split('-')[1]) - 1,
                parseInt(currentDisplayDate.split('-')[2])
            ));
            const formattedDate = `${dateObj.getUTCMonth() + 1}/${dateObj.getUTCDate()}/${dateObj.getUTCFullYear()}`;

            const headerDiv = document.createElement('div');
            headerDiv.className = 'day-header';

            const buttonsLeft = document.createElement('div');
            buttonsLeft.className = 'buttons-left';
            const backButton = document.createElement('button');
            backButton.className = 'back-button';
            backButton.textContent = 'Back to Schedule';
            backButton.addEventListener('click', () => {
                selectedTechnician = null;
                renderScheduleForDay(currentDisplayDate);
            });
            buttonsLeft.appendChild(backButton);

            const headerH2 = document.createElement('h2');
            headerH2.textContent = `${formattedDate} - ${techName} (OpenStreetMap)`;

            headerDiv.appendChild(buttonsLeft);
            headerDiv.appendChild(headerH2);
            daySection.appendChild(headerDiv);

            const routeSummary = document.createElement('p');
            routeSummary.className = 'route-summary';
            routeSummary.textContent = 'Computing route...';
            daySection.appendChild(routeSummary);

            const mapDiv = document.createElement('div');
            mapDiv.id = 'map';
            daySection.appendChild(mapDiv);
            scheduleDiv.appendChild(daySection);

            if (!window.L) {
                mapDiv.innerHTML = '<p class="error">Map library failed to load.</p>';
                return;
            }

            const map = L.map(mapDiv).setView([41.8781, -87.6298], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            const techData = scheduleData.find(tech => tech.technician === techName);
            if (!techData) {
                mapDiv.innerHTML = `<p class="error">No data for ${techName}</p>`;
                return;
            }

            const dayEntries = techData.schedule
                .filter(entry =>
                    entry.start_time.split('T')[0] === currentDisplayDate &&
                    ['pending', 'scheduled', 'complete'].includes(entry.work_order.status)
                )
                .sort((a, b) => a.start_time.localeCompare(b.start_time));

            if (!dayEntries.length) {
                mapDiv.insertAdjacentHTML('beforeend', '<p class="error">No scheduled assignments for this day.</p>');
                return;
            }

            const uniqueEntries = [];
            const seenAddresses = new Set();
            dayEntries.forEach(entry => {
                if (!seenAddresses.has(entry.work_order.address)) {
                    seenAddresses.add(entry.work_order.address);
                    uniqueEntries.push(entry);
                }
            });

            const homeAddress = techData.home_address || '600 W Jackson Blvd, Chicago, IL 60661';
            const routeStops = [
                { label: 'S', title: `Start: ${homeAddress}`, address: homeAddress, isHome: true },
                ...uniqueEntries.map((entry, index) => ({
                    label: String(index + 1),
                    title: `${entry.work_order.ticket_number} - ${entry.work_order.address}`,
                    address: entry.work_order.address,
                    details: entry
                })),
                { label: 'E', title: `End: ${homeAddress}`, address: homeAddress, isHome: true }
            ];

            const routeCoords = [];
            for (const stop of routeStops) {
                try {
                    const coords = await geocodeAddressOpenStreetMap(stop.address);
                    routeCoords.push({ ...coords, stop });
                } catch (error) {
                    console.error(`Geocode failed for ${stop.address}:`, error);
                }
            }

            if (!routeCoords.length) {
                mapDiv.innerHTML = '<p class="error">Could not geocode route addresses for map display.</p>';
                return;
            }

            routeCoords.forEach(point => {
                const marker = L.marker([point.lat, point.lon], {
                    icon: L.divIcon({
                        className: 'osm-stop-icon',
                        html: `<div class="osm-stop-marker${point.stop.isHome ? ' home' : ''}">${point.stop.label}</div>`,
                        iconSize: [26, 26],
                        iconAnchor: [13, 13]
                    })
                }).addTo(map);
                if (point.stop.details) {
                    const localTime = new Date(point.stop.details.start_time).toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    marker.bindPopup(
                        `<strong>${point.stop.details.work_order.ticket_number}</strong><br>` +
                        `Slot: ${localTime}<br>` +
                        `${point.stop.details.work_order.address}<br>` +
                        `Status: ${point.stop.details.work_order.status}`
                    );
                } else {
                    marker.bindPopup(point.stop.title);
                }
            });

            let route = null;
            let routeSource = 'none';
            try {
                const serverRoute = await fetchServerRoute(routeStops.map(stop => stop.address));
                if (serverRoute.status === 'success' && serverRoute.geometry && serverRoute.geometry.length > 1) {
                    route = {
                        geometry: {
                            coordinates: serverRoute.geometry.map(([lat, lon]) => [lon, lat])
                        },
                        legs: (serverRoute.legs || []).map(leg => ({
                            duration: leg.duration_seconds || 0,
                            distance: leg.distance_meters || 0
                        }))
                    };
                    routeSource = 'server';
                } else {
                    throw new Error(serverRoute.message || 'Server route unavailable');
                }
            } catch (error) {
                console.warn('Server route unavailable, trying OSRM fallback:', error);
                try {
                    route = await fetchRoadRoute(routeCoords);
                    routeSource = 'osrm';
                } catch (fallbackError) {
                    console.error('OSRM route fetch failed, falling back to straight-line display:', fallbackError);
                }
            }

            if (route && route.geometry && route.geometry.coordinates && route.geometry.coordinates.length > 1) {
                const roadPoints = route.geometry.coordinates.map(([lon, lat]) => [lat, lon]);
                const routeLine = L.polyline(roadPoints, { color: '#00b7ff', weight: 5, opacity: 0.9 }).addTo(map);
                map.fitBounds(routeLine.getBounds(), { padding: [20, 20] });

                const legs = route.legs || [];
                const totalSeconds = legs.reduce((sum, leg) => sum + (leg.duration || 0), 0);
                const totalMeters = legs.reduce((sum, leg) => sum + (leg.distance || 0), 0);
                const sourceLabel = routeSource === 'server' ? 'Google route' : 'OSM route';
                routeSummary.textContent = `${sourceLabel}: ${formatDurationSeconds(totalSeconds)} • ${formatDistanceMeters(totalMeters)} • ${Math.max(legs.length - 1, 0)} stops`;

                legs.forEach((leg, index) => {
                    if (!routeCoords[index + 1]) {
                        return;
                    }
                    const lat = (routeCoords[index].lat + routeCoords[index + 1].lat) / 2;
                    const lon = (routeCoords[index].lon + routeCoords[index + 1].lon) / 2;
                    L.marker([lat, lon], {
                        icon: L.divIcon({
                            className: 'route-time-icon',
                            html: `<div class="route-time-badge">${formatDurationSeconds(leg.duration || 0)}</div>`,
                            iconSize: [84, 20],
                            iconAnchor: [42, 10]
                        }),
                        interactive: false
                    }).addTo(map);
                });
            } else {
                const polylinePoints = routeCoords.map(p => [p.lat, p.lon]);
                if (polylinePoints.length > 1) {
                    const polyline = L.polyline(polylinePoints, { color: '#00b7ff', weight: 4, dashArray: '8 8' }).addTo(map);
                    map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
                    routeSummary.textContent = 'Road route unavailable right now; showing fallback line.';
                } else {
                    map.setView(polylinePoints[0], 13);
                    routeSummary.textContent = 'Only one mapped stop found.';
                }
            }
        }

        async function fetchSchedule(forceFetch = false) {
            const cacheKey = 'scheduleData';
            const cacheTimestampKey = 'scheduleDataTimestamp';
            const cachedData = localStorage.getItem(cacheKey);
            const cachedTimestamp = localStorage.getItem(cacheTimestampKey);
            const cacheAge = cachedTimestamp ? (Date.now() - parseInt(cachedTimestamp)) / 1000 : Infinity;
            console.log(`fetchSchedule called with forceFetch=${forceFetch}, cachedData exists: ${!!cachedData}, cache age: ${cacheAge}s`);

            if (!forceFetch && cachedData && cacheAge < 300) {
                scheduleData = JSON.parse(cachedData);
                console.log('Loaded schedule data from cache:', scheduleData);
                if (!currentWeekStart) {
                    initializeSchedule();
                } else {
                    renderScheduleForDay(currentDisplayDate);
                }
                return;
            }

            try {
                console.log('Fetching fresh schedule data from /api/schedule/');
                const response = await fetch(`/api/schedule/`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    mode: 'same-origin',
                    credentials: 'same-origin'
                });
                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                scheduleData = await response.json();
                console.log('Fetched schedule data from server:', scheduleData);
                localStorage.setItem(cacheKey, JSON.stringify(scheduleData));
                localStorage.setItem(cacheTimestampKey, Date.now().toString());

                if (response.headers.get('X-Cache-Invalidate') === 'true') {
                    console.log('Cache invalidation header received, clearing localStorage');
                    localStorage.removeItem('scheduleData');
                    localStorage.removeItem('scheduleDataTimestamp');
                    for (let key in localStorage) {
                        if (key.startsWith('mapData_')) {
                            localStorage.removeItem(key);
                        }
                    }
                }

                if (!currentWeekStart) {
                    initializeSchedule();
                } else {
                    renderScheduleForDay(currentDisplayDate);
                }
            } catch (error) {
                console.error('Error fetching schedule:', error);
                document.getElementById('schedule').innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }

        function initializeSchedule() {
            const startDate = new Date(Date.UTC(
                parseInt(initialStartDate.split('-')[0]),
                parseInt(initialStartDate.split('-')[1]) - 1,
                parseInt(initialStartDate.split('-')[2])
            ));
            const dayOfWeek = startDate.getUTCDay();
            currentWeekStart = new Date(startDate);
            // Use the current week's Sunday (not next Sunday).
            currentWeekStart.setUTCDate(startDate.getUTCDate() - dayOfWeek);

            const todayIso = toISODateUTC(startDate);
            const firstDateWithEntries = getFirstDateWithEntriesInWeek(currentWeekStart);
            currentDisplayDate = hasScheduleEntriesForDate(todayIso)
                ? todayIso
                : (firstDateWithEntries || toISODateUTC(currentWeekStart));
            renderDayButtons();
            renderScheduleForDay(currentDisplayDate);
        }

        function isCachedMapDataValid(techName, cachedMapData) {
            const techData = scheduleData.find(tech => tech.technician === techName);
            if (!techData) return false;

            const dayEntries = techData.schedule
                .filter(entry =>
                    entry.start_time.split('T')[0] === currentDisplayDate &&
                    ['pending', 'scheduled', 'complete'].includes(entry.work_order.status)
                )
                .sort((a, b) => a.start_time.localeCompare(b.start_time));

            const uniqueAddresses = [...new Set(dayEntries.map(entry => entry.work_order.address))];
            const cachedAddresses = cachedMapData.markers
                .filter(marker => marker.label !== 'S' && marker.label !== 'E')
                .map(marker => marker.title.split(': ')[1] || marker.title);

            if (uniqueAddresses.length !== cachedAddresses.length) {
                console.log('Cached map data invalid: mismatched number of stops');
                return false;
            }

            const addressesMatch = uniqueAddresses.every(addr =>
                cachedAddresses.includes(addr)
            ) && cachedAddresses.every(addr =>
                uniqueAddresses.includes(addr)
            );

            if (!addressesMatch) {
                console.log('Cached map data invalid: addresses do not match');
                return false;
            }

            return true;
        }

            directionsRenderer.setOptions({ suppressMarkers: true });

            if (map.markers) map.markers.forEach(marker => marker.setMap(null));
            if (map.travelMarkers) map.travelMarkers.forEach(marker => marker.setMap(null));
            if (map.travelLabels) map.travelLabels.forEach(label => label.close());
            map.markers = [];
            map.travelMarkers = [];
            map.travelLabels = [];

            const techData = scheduleData.find(tech => tech.technician === techName);
            if (!techData) {
                mapDiv.innerHTML = `<p class="error">No data for ${techName}</p>`;
                console.log(`No data found for technician ${techName}`);
                return;
            }

            const dayEntries = techData.schedule
                .filter(entry =>
                    entry.start_time.split('T')[0] === currentDisplayDate &&
                    ['pending', 'scheduled', 'complete'].includes(entry.work_order.status)
                )
                .sort((a, b) => a.start_time.localeCompare(b.start_time));
            console.log(`Found ${dayEntries.length} entries for ${techName} on ${currentDisplayDate}:`, dayEntries);
            if (dayEntries.length === 0) {
                mapDiv.innerHTML = `<p class="error">No scheduled assignments for ${techName} on this day.</p>`;
                console.log(`No assignments found for ${techName} on ${currentDisplayDate}`);
                const homeAddress = techData.home_address || '600 W Jackson Blvd, Chicago, IL 60661';
                const marker = new google.maps.Marker({
                    position: { lat: 41.8781, lng: -87.6298 },
                    map: map,
                    label: 'H',
                    title: `Home: ${homeAddress}`
                });
                map.markers.push(marker);
                map.setCenter({ lat: 41.8781, lng: -87.6298 });
                return;
            }

            dayEntries.forEach((entry, index) => {
                console.log(`Raw Entry ${index + 1}: WO-${entry.work_order.ticket_number} at ${entry.work_order.address}, Travel to next: ${entry.travel_to_next} minutes`);
            });

            const uniqueEntries = [];
            const seenAddresses = new Set();
            for (let i = 0; i < dayEntries.length; i++) {
                const entry = dayEntries[i];
                const currentAddress = entry.work_order.address;
                if (!seenAddresses.has(currentAddress)) {
                    seenAddresses.add(currentAddress);
                    uniqueEntries.push(entry);
                }
            }

            uniqueEntries.forEach((entry, index) => {
                console.log(`Unique Entry ${index + 1}: WO-${entry.work_order.ticket_number} at ${entry.work_order.address}, Travel to next: ${entry.travel_to_next} minutes`);
            });

            const waypoints = uniqueEntries.map((entry, index) => {
                console.log(`Waypoint ${index + 1}: ${entry.work_order.address}`);
                return {
                    location: entry.work_order.address,
                    stopover: true
                };
            });
            const homeAddress = techData.home_address || '600 W Jackson Blvd, Chicago, IL 60661';
            console.log(`Origin/Destination: ${homeAddress}`);

            const firstLegKey = `${homeAddress}|${uniqueEntries[0].work_order.address}`;
            let homeToFirstTravelTime;
            fetch(`/api/get-travel-time/?origin=${encodeURIComponent(homeAddress)}&destination=${encodeURIComponent(uniqueEntries[0].work_order.address)}`)
                .then(response => response.json())
                .then(data => {
                    homeToFirstTravelTime = data.travel_time;
                    console.log(`Fetched travel time for Home-1 (${firstLegKey}): ${homeToFirstTravelTime} minutes`);

                    directionsService.route({
                        origin: homeAddress,
                        destination: homeAddress,
                        waypoints: waypoints,
                        travelMode: google.maps.TravelMode.DRIVING,
                        optimizeWaypoints: false
                    }, (result, status) => {
                        if (status === google.maps.DirectionsStatus.OK) {
                            directionsRenderer.setDirections(result);
                            console.log('Directions API response:', result);
                            const route = result.routes[0];
                            const legs = route.legs;
                            console.log(`Route has ${legs.length} legs`);

                            const markers = [];
                            const travelMarkers = [];
                            const travelLabels = [];

                            const startMarker = new google.maps.Marker({
                                position: legs[0].start_location,
                                map: map,
                                label: 'S',
                                title: 'Start: ' + homeAddress
                            });
                            console.log('Added start marker at:', legs[0].start_location);
                            markers.push(startMarker);

                            uniqueEntries.forEach((entry, index) => {
                                const leg = legs[index];
                                const position = leg.end_location;
                                const timeSlot = entry.start_time.split('T')[1].startsWith('08:00:00') ? '8-10' :
                                                entry.start_time.split('T')[1].startsWith('10:00:00') ? '10-12' :
                                                entry.start_time.split('T')[1].startsWith('12:00:00') ? '12-2' : '2-4';
                                const infoContent = `
                                    <div>
                                        <strong>Stop ${index + 1}</strong><br>
                                        Time: ${timeSlot}<br>
                                        Work Order: ${entry.work_order.ticket_number}<br>
                                        Address: ${entry.work_order.address}
                                    </div>
                                `;
                                const marker = new google.maps.Marker({
                                    position: position,
                                    map: map,
                                    label: {
                                        text: String(index + 1),
                                        color: 'white',
                                        fontSize: '12px',
                                        fontWeight: 'bold'
                                    },
                                    title: entry.work_order.ticket_number
                                });
                                console.log(`Added marker for Stop ${index + 1} (${entry.work_order.ticket_number}) at:`, position);
                                const infoWindow = new google.maps.InfoWindow({ content: infoContent });
                                marker.addListener('mouseover', () => infoWindow.open(map, marker));
                                marker.addListener('mouseout', () => infoWindow.close());
                                markers.push(marker);
                            });

                            const endMarker = new google.maps.Marker({
                                position: legs[legs.length - 1].end_location,
                                map: map,
                                label: 'E',
                                title: 'End: ' + homeAddress
                            });
                            console.log('Added end marker at:', legs[legs.length - 1].end_location);
                            markers.push(endMarker);

                            legs.forEach((leg, legIndex) => {
                                let travelTime;
                                if (legIndex === 0) {
                                    travelTime = homeToFirstTravelTime;
                                } else if (legIndex < uniqueEntries.length) {
                                    travelTime = uniqueEntries[legIndex - 1].travel_to_next;
                                } else {
                                    travelTime = uniqueEntries[uniqueEntries.length - 1].travel_to_next;
                                }
                                const roundedTravelTime = Math.round(travelTime); // Round the travel time to a whole number
                                const fullPath = [];
                                leg.steps.forEach(step => {
                                    fullPath.push(...step.path);
                                });
                                const midPoint = fullPath[Math.floor(fullPath.length / 2)];
                                const segmentLabel = legIndex === 0 ? `Home-${legIndex + 1}` :
                                                    legIndex === legs.length - 1 ? `${uniqueEntries.length}-Home` :
                                                    `${legIndex}-${legIndex + 1}`;
                                console.log(`Displaying travel time for segment ${segmentLabel}: ${roundedTravelTime} minutes`);
                                const travelMarker = new google.maps.Marker({
                                    position: midPoint,
                                    map: showDistance ? map : null,
                                    icon: {
                                        url: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                                        scaledSize: new google.maps.Size(20, 20)
                                    },
                                    title: `${roundedTravelTime} Min (${segmentLabel})`
                                });
                                const travelLabel = new google.maps.InfoWindow({
                                    content: `${roundedTravelTime} Min<br>${segmentLabel}`
                                });
                                travelMarker.addListener('click', () => {
                                    travelLabel.getMap() ? travelLabel.close() : travelLabel.open(map, travelMarker);
                                });
                                if (showDistance) travelLabel.open(map, travelMarker);
                                console.log(`Added travel marker for ${segmentLabel} at:`, midPoint);
                                travelMarkers.push(travelMarker);
                                travelLabels.push(travelLabel);
                            });

                            map.markers = markers;
                            map.travelMarkers = travelMarkers;
                            map.travelLabels = travelLabels;

                            const bounds = new google.maps.LatLngBounds();
                            bounds.union(route.bounds);
                            map.fitBounds(bounds);

                            const mapData = {
                                route: { bounds: route.bounds },
                                markers: markers.map(m => ({ position: m.position, label: m.label, title: m.title })),
                                travelMarkers: travelMarkers.map(m => ({ position: m.position, title: m.title })),
                                travelLabels: travelLabels.map(l => ({ content: l.content }))
                            };
                            localStorage.setItem(cacheKey, JSON.stringify(mapData));
                        } else {
                            console.error('Directions failed:', status);
                            mapDiv.innerHTML = `<p class="error">Failed to load route: ${status}</p>`;
                        }
                    });
                })
                .catch(error => {
                    console.error('Error fetching travel time for Home-1:', error);
                    mapDiv.innerHTML = `<p class="error">Failed to fetch travel time for Home-1: ${error.message}</p>`;
                });
        }

        function renderCachedMap(route, markers, travelMarkers, travelLabels) {
            const scheduleDiv = document.getElementById('schedule');
            scheduleDiv.innerHTML = '';

            const daySection = document.createElement('div');
            daySection.className = 'day-section';
            const dateObj = new Date(Date.UTC(
                parseInt(currentDisplayDate.split('-')[0]),
                parseInt(currentDisplayDate.split('-')[1]) - 1,
                parseInt(currentDisplayDate.split('-')[2])
            ));
            const formattedDate = `${dateObj.getUTCMonth() + 1}/${dateObj.getUTCDate()}/${dateObj.getUTCFullYear()}`;

            const headerDiv = document.createElement('div');
            headerDiv.className = 'day-header';

            const buttonsLeft = document.createElement('div');
            buttonsLeft.className = 'buttons-left';
            const backButton = document.createElement('button');
            backButton.className = 'back-button';
            backButton.textContent = 'Back to Schedule';
            backButton.addEventListener('click', () => {
                selectedTechnician = null;
                renderScheduleForDay(currentDisplayDate);
            });
            const toggleButton = document.createElement('button');
            toggleButton.className = 'toggle-button';
            toggleButton.textContent = showDistance ? 'Hide Distance' : 'Show Distance';
            toggleButton.addEventListener('click', () => {
                showDistance = !showDistance;
                console.log(`Toggled showDistance to ${showDistance}`);
                toggleButton.textContent = showDistance ? 'Hide Distance' : 'Show Distance';
                if (map && map.travelMarkers) {
                    console.log(`Updating ${map.travelMarkers.length} travel markers`);
                    map.travelMarkers.forEach((marker, index) => {
                        if (showDistance) {
                            marker.setMap(map);
                            map.travelLabels[index].open(map, marker);
                        } else {
                            marker.setMap(null);
                            map.travelLabels[index].close();
                        }
                    });
                }
            });
            buttonsLeft.appendChild(backButton);
            buttonsLeft.appendChild(toggleButton);

            const headerH2 = document.createElement('h2');
            headerH2.textContent = `${formattedDate} - ${selectedTechnician}`;

            headerDiv.appendChild(buttonsLeft);
            headerDiv.appendChild(headerH2);

            daySection.appendChild(headerDiv);

            const mapDiv = document.createElement('div');
            mapDiv.id = 'map';
            daySection.appendChild(mapDiv);
            scheduleDiv.appendChild(daySection);

            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 12,
                center: { lat: 41.8781, lng: -87.6298 }
            });
            directionsRenderer.setMap(map);
            directionsRenderer.setOptions({ suppressMarkers: true });

            map.markers = markers.map(m => {
                const marker = new google.maps.Marker({
                    position: new google.maps.LatLng(m.position.lat, m.position.lng),
                    map: map,
                    label: m.label,
                    title: m.title
                });
                return marker;
            });
            map.travelMarkers = travelMarkers.map(m => {
                const roundedTitle = m.title.replace(/(\d+\.\d+) Min/, (match, p1) => `${Math.round(parseFloat(p1))} Min`);
                const marker = new google.maps.Marker({
                    position: new google.maps.LatLng(m.position.lat, m.position.lng),
                    map: showDistance ? map : null,
                    icon: {
                        url: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png',
                        scaledSize: new google.maps.Size(20, 20)
                    },
                    title: roundedTitle
                });
                return marker;
            });
            map.travelLabels = travelLabels.map((l, index) => {
                const roundedContent = l.content.replace(/(\d+\.\d+) Min/, (match, p1) => `${Math.round(parseFloat(p1))} Min`);
                const infoWindow = new google.maps.InfoWindow({ content: roundedContent });
                if (showDistance) infoWindow.open(map, map.travelMarkers[index]);
                return infoWindow;
            });

            const techData = scheduleData.find(tech => tech.technician === selectedTechnician);
            const waypoints = techData.schedule
                .filter(entry => entry.start_time.split('T')[0] === currentDisplayDate)
                .map(entry => ({ location: entry.work_order.address, stopover: true }));
            const homeAddress = techData.home_address || '600 W Jackson Blvd, Chicago, IL 60661';
            directionsService.route({
                origin: homeAddress,
                destination: homeAddress,
                waypoints: waypoints,
                travelMode: google.maps.TravelMode.DRIVING,
                optimizeWaypoints: false
            }, (result, status) => {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);
                    console.log('Re-rendered cached route successfully');
                    map.fitBounds(new google.maps.LatLngBounds().union(route.bounds));
                } else {
                    console.error('Failed to re-render cached route:', status);
                }
            });
        }

        function clearAllCaches() {
            console.log('Clearing all caches');
            localStorage.removeItem('scheduleData');
            localStorage.removeItem('scheduleDataTimestamp');
            for (let key in localStorage) {
                if (key.startsWith('mapData_')) {
                    localStorage.removeItem(key);
                }
            }
        }

        function showStatusPopup(event, ticketNumber, cell) {
            const popup = document.getElementById('status-popup');
            popup.style.display = 'block';

            const rect = cell.getBoundingClientRect();
            const popupWidth = popup.offsetWidth || 120;
            const popupHeight = popup.offsetHeight || 150;

            let left = rect.right + 5;
            let top = rect.top + window.scrollY;

            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            if (left + popupWidth > viewportWidth) {
                left = rect.left - popupWidth - 5;
            }

            if (top + popupHeight > viewportHeight + window.scrollY) {
                top = (viewportHeight + window.scrollY) - popupHeight - 5;
            }

            if (top < window.scrollY) {
                top = window.scrollY + 5;
            }

            popup.style.left = `${left}px`;
            popup.style.top = `${top}px`;

            const buttons = popup.querySelectorAll('button');
            buttons.forEach(button => {
                button.onclick = async () => {
                    const newStatus = button.getAttribute('data-status');
                    try {
                        const response = await fetch('/api/update-work-order-status/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ticket_number: ticketNumber, status: newStatus })
                        });
                        const result = await response.json();
                        if (result.status === 'success') {
                            clearAllCaches();
                            await fetchSchedule(true);
                            console.log('Schedule re-rendered after status update');
                            if (selectedTechnician) {
                                renderMapForTechnician(selectedTechnician);
                            }
                        } else {
                            alert(`Failed to update status: ${result.message}`);
                        }
                    } catch (error) {
                        console.error('Error updating status:', error);
                    }
                    popup.style.display = 'none';
                };
            });

            document.addEventListener('click', function closePopup(e) {
                if (!popup.contains(e.target) && !cell.contains(e.target)) {
                    popup.style.display = 'none';
                    document.removeEventListener('click', closePopup);
                }
            });
        }

        function updateWeek(offset) {
            if (!currentWeekStart) {
                console.error('currentWeekStart is null, initializing schedule');
                initializeSchedule();
                return;
            }
            const newWeekStart = new Date(currentWeekStart);
            newWeekStart.setUTCDate(currentWeekStart.getUTCDate() + offset * 7);
            currentWeekStart = newWeekStart;
            currentDisplayDate = getFirstDateWithEntriesInWeek(currentWeekStart) || toISODateUTC(currentWeekStart);
            renderDayButtons();
            if (selectedTechnician) {
                renderMapForTechnician(selectedTechnician);
            } else {
                renderScheduleForDay(currentDisplayDate);
            }
            updateActiveDayButton(0);
        }

        document.getElementById('prevWeek').addEventListener('click', () => updateWeek(-1));
        document.getElementById('nextWeek').addEventListener('click', () => updateWeek(1));

        document.getElementById('close-form').addEventListener('click', () => {
            document.getElementById('add-wo-form').style.display = 'none';
        });

        document.getElementById('wo-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const activityType = document.getElementById('activity-type').value;
            const address = document.getElementById('address').value;
            const availability = document.getElementById('availability').value;

            const newWo = {
                activity_type: activityType,
                address: address,
                customer_availability: availability
            };

            try {
                console.log('Creating new work order:', newWo);
                const createResponse = await fetch('/api/create-work-order/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newWo)
                });
                const createResult = await createResponse.json();
                if (createResult.status !== 'success') {
                    throw new Error(`Failed to create work order: ${createResult.message}`);
                }
                const ticketNumber = createResult.ticket_number;
                console.log(`Created work order ${ticketNumber}`);

                console.log(`Scheduling work order ${ticketNumber}`);
                const scheduleResponse = await fetch('/api/schedule-selected/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticket_numbers: [ticketNumber] })
                });
                const scheduleResult = await scheduleResponse.json();
                if (scheduleResult.status === 'success') {
                    alert(scheduleResult.message);
                    console.log(`Schedule response headers:`, scheduleResponse.headers);
                    clearAllCaches();
                    await fetchSchedule(true);
                    if (selectedTechnician) {
                        renderMapForTechnician(selectedTechnician);
                    } else {
                        renderScheduleForDay(currentDisplayDate);
                    }
                } else {
                    alert(`Failed to schedule work order: ${scheduleResult.message}`);
                }
            } catch (error) {
                console.error('Error adding/scheduling work order:', error);
                alert('An error occurred while adding/scheduling the work order.');
            }
            document.getElementById('add-wo-form').style.display = 'none';
        });

        const menuButton = document.getElementById('menu-button');
        const sidebar = document.getElementById('sidebar');
        const dispatchToggle = document.getElementById('dispatch-center-toggle');
        const sidebarMenu = document.getElementById('sidebar-menu');
        const headerTitle = document.getElementById('header-title');
        const dropdown = document.getElementById('activity-dropdown');

        menuButton.addEventListener('click', () => {
            sidebar.style.left = sidebar.style.left === '0px' ? '-250px' : '0px';
        });

        dispatchToggle.addEventListener('click', () => {
            sidebarMenu.style.display = sidebarMenu.style.display === 'none' ? 'block' : 'none';
        });

        document.addEventListener('click', (event) => {
            if (!sidebar.contains(event.target) && event.target !== menuButton) {
                sidebar.style.left = '-250px';
            }
            if (!dropdown.contains(event.target) && event.target !== headerTitle) {
                dropdown.style.display = 'none';
            }
        });

        headerTitle.addEventListener('click', () => {
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        });

        dropdown.querySelectorAll('.dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                selectedActivityType = item.getAttribute('data-activity');
                console.log(`Selected activity type: ${selectedActivityType}`);
                dropdown.style.display = 'none';
                renderScheduleForDay(currentDisplayDate);
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            // If Google Maps is unavailable (no key), still load schedule data.
            if (!window.google || !window.google.maps) {
                fetchTechnicians().then(() => fetchSchedule(true));
            }
        });
    </script>
</body>
